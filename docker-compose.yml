name: comapeo-headless

services:
  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    # host networking is required for mDNS peer discovery (ciao/Bonjour).
    network_mode: host
    restart: unless-stopped
    volumes:
      - comapeo-data:/data
    environment:
      # Required: set the device name visible to other CoMapeo peers.
      COMAPEO_DEVICE_NAME: ${COMAPEO_DEVICE_NAME:?COMAPEO_DEVICE_NAME is required}
      COMAPEO_DATA_DIR: /data
      COMAPEO_AUTO_ACCEPT_INVITES: ${COMAPEO_AUTO_ACCEPT_INVITES:-true}
      COMAPEO_DEVICE_TYPE: ${COMAPEO_DEVICE_TYPE:-desktop}
      # Optional: override the persisted root key (hex string, 32 chars = 16 bytes).
      COMAPEO_ROOT_KEY: ${COMAPEO_ROOT_KEY:-}
      # Optional: URL for online map tiles.
      ONLINE_STYLE_URL: ${ONLINE_STYLE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}

volumes:
  comapeo-data:
    driver: local
